services:
  postgres:
    image: postgres:16-alpine
    container_name: z5esportes-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-z5_esportes}
      POSTGRES_USER: ${POSTGRES_USER:-z5_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-z5_admin_local}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-z5_admin} -d ${POSTGRES_DB:-z5_esportes}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
